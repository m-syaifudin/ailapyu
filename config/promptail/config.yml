server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      # pakai nama container sebagai label "service"
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service

      # tambah label nama image
      - source_labels: [__meta_docker_container_image]
        target_label: image

      # filter: hanya collect container yang ada label "logging=promtail"
      # kalau mau semua container, hapus 2 baris ini
      # - source_labels: [__meta_docker_container_label_logging]
      #   regex: promtail
      #   action: keep

    pipeline_stages:
      # coba parse sebagai JSON dulu (FastAPI biasanya JSON)
      - json:
          expressions:
            level: level
            message: message
            timestamp: time

      # kalau bukan JSON, anggap plain text
      - labels:
          level:

      # normalisasi level
      - replace:
          expression: '(?i)(warn(ing)?)'
          replace: 'warning'
          source: level
      - replace:
          expression: '(?i)(err(or)?)'
          replace: 'error'
          source: level
