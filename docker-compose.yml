services:
  ollama:
    image: ollama/ollama:latest
    container_name: ailapyu-ollama
    restart: unless-stopped

    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/init.sh:/init.sh:ro

    command: >
      sh -c "
      ollama serve &
      OLLAMA_PID=$!;

      echo 'Waiting for Ollama...';

      until curl -sf http://127.0.0.1:11434/api/tags > /dev/null; do
        sleep 2;
      done;

      echo 'Pulling model if missing...';

      ollama list | grep '${OLLAMA_MODEL}' ||
      ollama pull ${OLLAMA_MODEL};

      wait $OLLAMA_PID
      "

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ailapyu-api

    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${API_PORT}:8000"

    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data: