# ailapyu – lightweight local AI service
# OpenAI-compatible API via Ollama

services:

  # ── 1. Ollama model runtime ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ailapyu_ollama
    restart: unless-stopped

    environment:
      OLLAMA_HOST: "${OLLAMA_HOST:-0.0.0.0}"

    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"   # bind to localhost only

    volumes:
      - ${OLLAMA_VOLUME:-ollama_data}:/root/.ollama  # persist downloaded models

    deploy:
      resources:
        limits:
          memory: "${OLLAMA_MEMORY_LIMIT:-3g}"
          cpus:   "${OLLAMA_CPU_LIMIT:-1.8}"

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout:  5s
      retries:  6
      start_period: 20s

    networks:
      - ailapyu_net

  # ── 2. Model initialiser (runs once, then exits) ────────────────────────────
  init-model:
    image: curlimages/curl:latest
    container_name: ailapyu_init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy

    # Pull the default model via Ollama's REST API.
    # The pull is idempotent – already-downloaded layers are skipped.
    entrypoint: >
      sh -c "
        echo '>>> Pulling model: ${DEFAULT_MODEL:-qwen2.5:1.5b} …' &&
        curl -sf --max-time 600 \
          -X POST http://ollama:11434/api/pull \
          -H 'Content-Type: application/json' \
          -d '{\"name\": \"${DEFAULT_MODEL:-qwen2.5:1.5b}\", \"stream\": false}' &&
        echo '>>> Model ready.'
      "

    networks:
      - ailapyu_net

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  ollama_data:
    name: "${OLLAMA_VOLUME:-ollama_data}"

networks:
  ailapyu_net:
    driver: bridge