services:
  ollama:
    image: ollama/ollama:latest
    container_name: ailapyu-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 3G

  model-init:
    image: ollama/ollama:latest
    container_name: ailapyu-model-init
    restart: "no"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - DEFAULT_MODEL=${DEFAULT_MODEL:-qwen2.5:1.5b}
    entrypoint: >
      /bin/sh -c "
        echo '[model-init] Waiting for Ollama to be ready...';
        until curl -sf http://ollama:11434/api/tags > /dev/null 2>&1; do
          echo '[model-init] Ollama not ready yet, retrying in 5s...';
          sleep 5;
        done;
        echo '[model-init] Ollama is ready. Pulling model: $$DEFAULT_MODEL ...';
        ollama pull $$DEFAULT_MODEL;
        echo '[model-init] Model pull complete.';
      "
    depends_on:
      ollama:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ailapyu-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  ollama_models:
    driver: local