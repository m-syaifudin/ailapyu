# ailapyu – lightweight local AI service
# OpenAI-compatible API via Ollama

services:
  db:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "${LOCAL_HOST}"
      OLLAMA_NUM_PARALLEL: "${OLLAMA_NUM_PARALLEL}"
      OLLAMA_MAX_LOADED_MODELS: "${OLLAMA_MAX_LOADED_MODELS}"    
      # OLLAMA_NUM_THREADS: "${OLLAMA_NUM_THREADS}"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: "${OLLAMA_MEMORY_LIMIT}"
          cpus: "${OLLAMA_CPU_LIMIT}"
    networks:
      - app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  init-model:
    image: ollama/ollama:latest
    container_name: ollama_init
    restart: "no"
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '>>> Waiting for Ollama...'
        until ollama list > /dev/null 2>&1; do sleep 2; done
        echo '>>> Pulling model: ${DEFAULT_MODEL}...'
        ollama pull ${DEFAULT_MODEL}
        echo '>>> Model ready.'
    environment:
      OLLAMA_HOST: "${OLLAMA_INTERNAL_URL}"
    networks:
      - app

  api:
    build:
      context: ./api
    container_name: api
    env_file: .env
    environment:
      OLLAMA_HOST: "${OLLAMA_INTERNAL_URL}"
      OLLAMA_MODEL: "${DEFAULT_MODEL}"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      ollama:
        condition: service_started
      init-model:
        condition: service_completed_successfully
    networks:
      - app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
      - WEB_API_URL=${WEB_API_URL}
    container_name: flutter
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    networks:
      - app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: ./proxy
    container_name: nginx
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/certbot:/etc/letsencrypt
      - ./proxy/www:/var/www/certbot
    depends_on:
      frontend:
          condition: service_started
      api:
        condition: service_started
    networks:
      - app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:2.9.10
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./config/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_data:/tmp/promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - monitoring
      - app
    user: root

  loki:
    image: grafana/loki:2.9.10
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./config/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    user: "10001:10001"
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring

  node_exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.53.2
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.4
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - prometheus
    networks:
      - monitoring

volumes:
  pg_data:
  ollama_data:
    name: "${OLLAMA_VOLUME}"
  loki_data:
  promtail_data:
  prometheus_data:
  grafana_data:

networks:
  app:
    driver: bridge
  monitoring:
    driver: bridge