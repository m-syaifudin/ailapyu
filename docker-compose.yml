# ailapyu – lightweight local AI service
# OpenAI-compatible API via Ollama

services:
  db:
    image: postgres:16-alpine
    container_name: ailapyu_db
    restart: unless-stopped
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ailapyu_net

  ollama:
    image: ollama/ollama:latest
    container_name: ailapyu_ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "${OLLAMA_HOST:-0.0.0.0}"
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ${OLLAMA_VOLUME:-ollama_data}:/root/.ollama
    deploy:
      resources:
        limits:
          memory: "${OLLAMA_MEMORY_LIMIT:-3g}"
          cpus:   "${OLLAMA_CPU_LIMIT:-1.8}"
    networks:
      - ailapyu_net

  init-model:
    image: ollama/ollama:latest
    container_name: ailapyu_init
    restart: "no"
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '>>> Waiting for Ollama...'
        until ollama list > /dev/null 2>&1; do sleep 2; done
        echo '>>> Pulling model: ${DEFAULT_MODEL:-llama3.2:3b}...'
        ollama pull ${DEFAULT_MODEL:-llama3.2:3b}
        echo '>>> Model ready.'
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    networks:
      - ailapyu_net

  api:
    build:
      context: ./api
    container_name: ailapyu_api
    env_file: .env
    environment:
      OLLAMA_HOST: "${OLLAMA_INTERNAL_URL}"
      OLLAMA_MODEL: "${DEFAULT_MODEL}"
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - ailapyu_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
      - WEB_API_URL=${WEB_API_URL}
    container_name: ailapyu_frontend
    ports:
      - "${WEB_PORT:-8080}:80"    
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    networks:
      - ailapyu_net

volumes:
  pg_data:
  ollama_data:
    name: "${OLLAMA_VOLUME:-ollama_data}"

networks:
  ailapyu_net:
    driver: bridge