# ailapyu – lightweight local AI service
# OpenAI-compatible API via Ollama

services:

  ollama:
    image: ollama/ollama:latest
    container_name: ailapyu_ollama
    restart: unless-stopped

    environment:
      OLLAMA_HOST: "${OLLAMA_HOST:-0.0.0.0}"

    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"

    volumes:
      - ${OLLAMA_VOLUME:-ollama_data}:/root/.ollama

    deploy:
      resources:
        limits:
          memory: "${OLLAMA_MEMORY_LIMIT:-3g}"
          cpus:   "${OLLAMA_CPU_LIMIT:-1.8}"

    networks:
      - ailapyu_net

  init-model:
    image: ollama/ollama:latest
    container_name: ailapyu_init
    restart: "no"
    depends_on:
      - ollama

    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '>>> Waiting for Ollama...'
        until ollama list > /dev/null 2>&1; do sleep 2; done
        echo '>>> Pulling model: ${DEFAULT_MODEL:-qwen2.5:1.5b}...'
        ollama pull ${DEFAULT_MODEL:-qwen2.5:1.5b}
        echo '>>> Model ready.'

    environment:
      OLLAMA_HOST: "http://ollama:11434"

    networks:
      - ailapyu_net

  api:
    build:
      context: ./api
    container_name: ailapyu_api
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: "${DEFAULT_MODEL:-qwen2.5:1.5b}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    depends_on:
      - ollama
    networks:
      - ailapyu_net



volumes:
  ollama_data:
    name: "${OLLAMA_VOLUME:-ollama_data}"

networks:
  ailapyu_net:
    driver: bridge